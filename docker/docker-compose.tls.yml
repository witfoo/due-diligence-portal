---
# Custom TLS certificate deployment.
# Mount your certificate files to /certs/ as tls.crt and tls.key.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  portal:
    image: ghcr.io/witfoo/due-diligence-portal:latest
    container_name: dd-portal
    restart: unless-stopped
    ports:
      - "443:8443"
      - "80:8080"
    environment:
      DD_TLS_MODE: custom
      DD_TLS_CERT_PATH: /certs/tls.crt
      DD_TLS_KEY_PATH: /certs/tls.key
      DD_HTTP_PORT: "8080"
      DD_HTTPS_PORT: "8443"
      DD_JWT_SECRET: "${DD_JWT_SECRET}"
      DD_DB_PATH: /data/portal.db
      DD_UI_PATH: /app/ui/build
      DD_MAX_UPLOAD_SIZE: "${DD_MAX_UPLOAD_SIZE:-104857600}"
      DD_ADMIN_EMAIL: "${DD_ADMIN_EMAIL:-admin@localhost}"
      DD_ADMIN_PASSWORD: "${DD_ADMIN_PASSWORD:-}"
      DD_SMTP_ENABLED: "${DD_SMTP_ENABLED:-false}"
      DD_SMTP_HOST: "${DD_SMTP_HOST:-}"
      DD_SMTP_PORT: "${DD_SMTP_PORT:-587}"
      DD_SMTP_FROM: "${DD_SMTP_FROM:-noreply@example.com}"
    volumes:
      - portal-data:/data
      - ./certs:/certs:ro
    logging: *default-logging

volumes:
  portal-data:
    driver: local

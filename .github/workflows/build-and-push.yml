---
name: Build and Push

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      branch_tag: ${{ steps.branch.outputs.tag }}
    steps:
      - name: Extract branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          TAG=$(echo "$BRANCH" | sed 's|/|-|g')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - name: Go Lint
        run: |
          go vet ./...
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --config .golangci.yml ./...
      - name: UI Lint
        run: cd ui && npm run lint

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - name: Go Unit Tests
        run: go test -short -count=1 -coverprofile=coverage.out ./...
      - name: UI Unit Tests
        run: cd ui && npm test
      - name: Coverage Summary
        run: go tool cover -func=coverage.out | tail -1

  race-detection:
    name: Race Detection
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - run: go test -race -short -count=1 ./...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Go Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [setup, lint, unit-test, race-detection, security-scan]
    if: >-
      always() &&
      needs.lint.result == 'success' &&
      needs.unit-test.result == 'success' &&
      needs.race-detection.result == 'success' &&
      needs.security-scan.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.branch_tag }}
          build-args: |
            VERSION=${{ needs.setup.outputs.branch_tag }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Tag latest on main
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.branch_tag }}
